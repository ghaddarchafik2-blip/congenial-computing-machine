name: Live Key Extractor
on:
  repository_dispatch:
    types: [trigger_extraction]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Extraction Script
        env:
          FB_TOKEN: ${{ github.event.client_payload.fb_token }}
          PAGE_ID: ${{ github.event.client_payload.page_id }}
          STREAM_SOURCE: ${{ github.event.client_payload.source }}
          TG_CHAT_ID: ${{ github.event.client_payload.chat_id }}
          TG_BOT_TOKEN: ${{ github.event.client_payload.bot_token }}
          STREAM_COUNT: ${{ github.event.client_payload.count }}
        run: python extract_worker.py
        
